spring.datasource.url=jdbc:h2:mem:${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis.mapper-locations=classpath:mapper/*.xml

security.jwt.secret=test-jwt-secret-must-have-at-least-thirty-two-bytes
security.jwt.expire-minutes=120

application.upload.dir=./target/test-uploads
application.upload.max-size-mb=1

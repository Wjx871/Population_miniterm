spring.application.name=population-miniterm
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/population_miniterm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis.mapper-locations=classpath:mapper/*.xml

spring.jackson.time-zone=Asia/Shanghai

# Local development placeholder only. Production must set a random JWT_SECRET of at least 32 bytes.
security.jwt.secret=${JWT_SECRET:local-development-jwt-secret-change-before-production-2026}
security.jwt.expire-minutes=${JWT_EXPIRE_MINUTES:120}

application.upload.dir=${APP_UPLOAD_DIR:./data/uploads}
application.upload.max-size-mb=${APP_UPLOAD_MAX_SIZE_MB:10}
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_SIZE_MB:10}MB
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_SIZE_MB:10}MB

# Course-simulation residence permit rules. Override in each deployment.
residence-permit.min-residence-days=${RESIDENCE_PERMIT_MIN_RESIDENCE_DAYS:180}
residence-permit.validity-days=${RESIDENCE_PERMIT_VALIDITY_DAYS:365}
residence-permit.endorsement-early-days=${RESIDENCE_PERMIT_ENDORSEMENT_EARLY_DAYS:30}
residence-permit.expiry-warning-days=${RESIDENCE_PERMIT_EXPIRY_WARNING_DAYS:30}
residence-permit.expiry-cron=${RESIDENCE_PERMIT_EXPIRY_CRON:0 0 2 * * *}

export.dir=${EXPORT_DIR:./data/exports}
export.normal-max-rows=${EXPORT_NORMAL_MAX_ROWS:5000}
export.sensitive-max-rows=${EXPORT_SENSITIVE_MAX_ROWS:20000}
export.file-retention-days=${EXPORT_FILE_RETENTION_DAYS:7}
export.cleanup-cron=${EXPORT_CLEANUP_CRON:0 30 2 * * *}

# Optional Redis cache/security helper. MySQL remains the source of truth.
population.redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
population.redis.key-prefix=${REDIS_KEY_PREFIX:population}
population.redis.region-ttl=${REDIS_REGION_TTL:30m}
population.redis.dictionary-ttl=${REDIS_DICTIONARY_TTL:30m}
population.redis.overview-ttl=${REDIS_OVERVIEW_TTL:5m}
population.redis.trend-ttl=${REDIS_TREND_TTL:5m}

# IdCard OCR backend (Phase 14 / V4_013). The local stub in d:\ocr-stub\app.py
# wraps the Baidu AI Platform cloud OCR (aip.baidubce.com/rest/2.0/ocr/v1/idcard).
#
# SECURITY: do NOT hard-code Baidu AK/SK here. Pass them via env vars or
# a separate application-prod.properties that is excluded from VCS.
population.person.idcard.ocr.url=${IDCARD_OCR_URL:http://127.0.0.1:8866}
population.person.idcard.ocr.path=${IDCARD_OCR_PATH:/recognize/idcard}
population.person.idcard.ocr.provider=${IDCARD_OCR_PROVIDER:BAIDU_AI_PLATFORM}
population.person.idcard.ocr.engine-version=${IDCARD_OCR_ENGINE:baidu-ocr-idcard-v1}
population.person.idcard.ocr.timeout-ms=${IDCARD_OCR_TIMEOUT_MS:15000}

# Optional: alert when these credentials are missing in non-dev environments.
population.person.idcard.ocr.warn-on-missing-credentials=${IDCARD_WARN_ON_MISSING_CREDENTIALS:false}

# Optional OpenAI-compatible policy-answering service. The knowledge-base fallback remains available without a key.
policy.ai.enabled=${POLICY_AI_ENABLED:false}
policy.ai.base-url=${POLICY_AI_BASE_URL:https://api.deepseek.com}
policy.ai.api-key=${POLICY_AI_API_KEY:}
policy.ai.model=${POLICY_AI_MODEL:deepseek-chat}
policy.ai.timeout-seconds=${POLICY_AI_TIMEOUT_SECONDS:30}

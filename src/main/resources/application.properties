spring.application.name=population-miniterm
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/population_miniterm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis.mapper-locations=classpath:mapper/*.xml

spring.jackson.time-zone=Asia/Shanghai

# Local development placeholder only. Production must set a random JWT_SECRET of at least 32 bytes.
security.jwt.secret=${JWT_SECRET:local-development-jwt-secret-change-before-production-2026}
security.jwt.expire-minutes=${JWT_EXPIRE_MINUTES:120}

application.upload.dir=${APP_UPLOAD_DIR:./data/uploads}
application.upload.max-size-mb=${APP_UPLOAD_MAX_SIZE_MB:10}
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_SIZE_MB:10}MB
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_SIZE_MB:10}MB

# Course-simulation residence permit rules. Override in each deployment.
residence-permit.min-residence-days=${RESIDENCE_PERMIT_MIN_RESIDENCE_DAYS:180}
residence-permit.validity-days=${RESIDENCE_PERMIT_VALIDITY_DAYS:365}
residence-permit.endorsement-early-days=${RESIDENCE_PERMIT_ENDORSEMENT_EARLY_DAYS:30}
residence-permit.expiry-warning-days=${RESIDENCE_PERMIT_EXPIRY_WARNING_DAYS:30}
residence-permit.expiry-cron=${RESIDENCE_PERMIT_EXPIRY_CRON:0 0 2 * * *}
